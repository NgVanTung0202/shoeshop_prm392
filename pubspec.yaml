name: shoeshop_prm392
description: Shoe Shop PRM392 Flutter Project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_rating_bar: ^4.0.1
  fl_chart: ^0.69.0 # Cập nhật bản mới nhất để vẽ biểu đồ ổn định

  # Firebase
  firebase_core: ^3.1.0 # Nên nâng cấp để tương thích với SDK mới nhất
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # State management
  provider: ^6.1.2

  # Image handling
  image_picker: ^1.1.2
  file_selector: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  # Animations (Giữ lại từ HEAD để dùng cho các hiệu ứng chuyển cảnh)
  simple_animations: ^5.0.0
  supercharged: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/banner/
    - assets/nike/
    - assets/adidas/
    - assets/puma/
    - assets/boots/
    - assets/snakers/